name: Development CI Pipeline

on:
  push:
    branches:
      - feature/github-actions
      - develop

  pull_request:
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show Files
        run: ls -R

      - name: Check Frontend Files
        run: |
          test -f src/frontend/index.html
          test -f src/frontend/style.css

      - name: Build Docker Image
        run: docker build -t frontend:v1 .