<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0b0f14">
  <title>Stats — ShopEase</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <aside class="sidebar" aria-label="Primary">
    <div class="sidebar-inner">
      <div class="brand">
        <h1 class="logo">ShopEase</h1>
        <div class="dashboard-label">Dashboard</div>
      </div>
      <nav class="sidebar-nav" aria-label="Main navigation">
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="products.html">Products</a></li>
          <li><a href="stats.html">Stats</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </aside>

  <main id="main">
    <section class="hero">
      <div class="container hero-content">
        <h2>Platform Performance</h2>
        <p class="lead">Key metrics and trends for your store.</p>
      </div>
    </section>

    <section class="stats">
      <div class="container stats-grid">
        <div class="stat-card">
          <p class="stat-number">1,200+</p>
          <p class="stat-label">Orders Completed</p>
          <div class="chart-placeholder">📈</div>
        </div>

        <div class="stat-card">
          <p class="stat-number">850+</p>
          <p class="stat-label">Active Users</p>
          <div class="chart-placeholder">📊</div>
        </div>

        <div class="stat-card">
          <p class="stat-number">$50K+</p>
          <p class="stat-label">Revenue</p>
          <div class="chart-placeholder">💹</div>
        </div>
      </div>
    </section>

    <section class="details container">
      <h3>Traffic Overview</h3>
      <div class="chart-large">
        <canvas id="trafficChart" aria-label="Traffic overview line chart" role="img"></canvas>
      </div>
    </section>

    <footer>
      <div class="container footer-inner">© 2026 ShopEase. All Rights Reserved.</div>
    </footer>
  </main>
  <script src="stats-chart.js"></script>
</body>
</html>
